kind = "web"
previewPath = "/"
title = "M-PESA Business Loans"
version = "1.0.0"
id = "artifacts/mpesa-business-loans"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22025

[services.development]
run = "pnpm --filter @workspace/mpesa-business-loans run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mpesa-business-loans", "run", "build" ]
publicDir = "artifacts/mpesa-business-loans/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22025"
BASE_PATH = "/"
