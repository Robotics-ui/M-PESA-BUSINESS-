openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: M-PESA Business Loans API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Email and password authentication endpoints.
  - name: Storage
    description: File upload and object serving endpoints.
  - name: Profile
    description: Customer profile management (documents, phone verification).
  - name: Loans
    description: Loan applications, active loans, and repayment schedules.
  - name: Admin
    description: Admin dashboard stats, customer management, loan review.
  - name: Notifications
    description: In-app notification feed.
  - name: Settings
    description: System settings.
  - name: VirtualCards
    description: Customer virtual card submission and admin review.
  - name: Withdrawals
    description: Loan withdrawal initiation, card verification, and disbursement.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------- Auth ----------
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/signup:
    post:
      tags: [Auth]
      operationId: signUp
      summary: Create a new customer account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        '200':
          description: Account created, session cookie set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '409':
          description: An account with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: logIn
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful, session cookie set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logout:
    post:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the current session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /auth/change-password:
    post:
      tags: [Auth]
      operationId: changeMyPassword
      summary: Change the current user's password (also clears any temporary-password flag)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordInput'
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Not authenticated or current password incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Storage ----------
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUploadUrlInput'
      responses:
        '200':
          description: Presigned URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestUploadUrlResult'

  # ---------- Profile ----------
  /profile:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get the current customer's profile
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CustomerProfile'
                  - type: 'null'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Create or update the current customer's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerProfileInput'
      responses:
        '200':
          description: Profile saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfile'
  /profile/documents:
    get:
      tags: [Profile]
      operationId: listMyDocuments
      summary: List documents uploaded by the current customer
      responses:
        '200':
          description: List of documents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
    post:
      tags: [Profile]
      operationId: addMyDocument
      summary: Record an uploaded document (ID front/back, selfie, supporting)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '201':
          description: Document recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
  /profile/otp/request:
    post:
      tags: [Profile]
      operationId: requestPhoneOtp
      summary: Generate an OTP code for phone verification (stubbed delivery)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequestInput'
      responses:
        '200':
          description: OTP generated. In this foundation phase, the code is returned directly since no SMS provider is connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResult'
  /profile/otp/verify:
    post:
      tags: [Profile]
      operationId: verifyPhoneOtp
      summary: Verify a phone OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyInput'
      responses:
        '200':
          description: Verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerifyResult'
        '400':
          description: Invalid or expired code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Loans (customer-facing) ----------
  /loan-applications:
    get:
      tags: [Loans]
      operationId: listMyLoanApplications
      summary: List the current customer's loan applications
      responses:
        '200':
          description: List of loan applications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoanApplication'
    post:
      tags: [Loans]
      operationId: createLoanApplication
      summary: Apply for a business loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanApplicationInput'
      responses:
        '201':
          description: Loan application created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplication'
  /loan-applications/{id}:
    get:
      tags: [Loans]
      operationId: getMyLoanApplication
      summary: Get one of the current customer's loan applications
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Loan application found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplication'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /loans:
    get:
      tags: [Loans]
      operationId: listMyLoans
      summary: List the current customer's active and past loans
      responses:
        '200':
          description: List of loans.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Loan'
  /loans/{id}/repayments:
    get:
      tags: [Loans]
      operationId: getLoanRepaymentSchedule
      summary: Get the repayment schedule for a loan
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Repayment schedule.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repayment'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Notifications ----------
  /notifications:
    get:
      tags: [Notifications]
      operationId: listMyNotifications
      summary: List notifications for the current user
      responses:
        '200':
          description: List of notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      operationId: markNotificationRead
      summary: Mark a notification as read
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Notification updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Admin ----------
  /admin/dashboard/stats:
    get:
      tags: [Admin]
      operationId: getAdminDashboardStats
      summary: Get admin dashboard summary statistics
      responses:
        '200':
          description: Dashboard statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
  /admin/customers:
    get:
      tags: [Admin]
      operationId: listCustomers
      summary: List all customers
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, suspended]
      responses:
        '200':
          description: List of customers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerSummary'
  /admin/customers/{id}:
    get:
      tags: [Admin]
      operationId: getCustomerDetail
      summary: Get a customer's full detail (profile, documents, loans)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Customer detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/customers/{id}/status:
    patch:
      tags: [Admin]
      operationId: updateCustomerStatus
      summary: Suspend or activate a customer account
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerStatusUpdate'
      responses:
        '200':
          description: Customer updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSummary'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/loan-applications:
    get:
      tags: [Admin]
      operationId: listAllLoanApplications
      summary: List all loan applications (optionally filtered by status)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, hold]
      responses:
        '200':
          description: List of loan applications with customer info.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoanApplicationWithCustomer'
  /admin/loan-applications/{id}/decision:
    patch:
      tags: [Admin]
      operationId: decideLoanApplication
      summary: Approve, reject, or hold a loan application
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanApplicationDecision'
      responses:
        '200':
          description: Loan application decided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplicationWithCustomer'
        '400':
          description: Validation error, e.g. missing rejection reason.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
  /admin/loan-applications/{id}/edit:
    patch:
      tags: [Admin]
      operationId: editLoanApplication
      summary: Edit an applied loan's details before it is decided
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanApplicationEdit'
      responses:
        '200':
          description: Loan application updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplicationWithCustomer'
        '400':
          description: Validation error, e.g. application already decided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
  /admin/audit-logs:
    get:
      tags: [Admin]
      operationId: listAuditLogs
      summary: List recent audit log entries
      responses:
        '200':
          description: List of audit log entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'

  # ---------- Virtual Cards (customer) ----------
  /virtual-cards/mine:
    get:
      tags: [VirtualCards]
      operationId: listMyVirtualCards
      summary: List virtual cards submitted by the authenticated customer
      responses:
        '200':
          description: List of virtual cards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VirtualCard'
  /virtual-cards:
    post:
      tags: [VirtualCards]
      operationId: createVirtualCard
      summary: Submit a virtual card for admin approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VirtualCardInput'
      responses:
        '201':
          description: Virtual card submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualCard'

  # ---------- Virtual Cards (admin) ----------
  /admin/virtual-cards:
    get:
      tags: [Admin]
      operationId: listAllVirtualCards
      summary: List all virtual cards, optionally filtered by status (staff only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: List of virtual cards with customer info.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VirtualCardWithCustomer'
  /admin/virtual-cards/{id}/decision:
    patch:
      tags: [Admin]
      operationId: decideVirtualCard
      summary: Approve, reject, or request a new virtual card
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VirtualCardDecision'
      responses:
        '200':
          description: Virtual card decision recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualCardAdmin'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Customer loan amount / status (admin) ----------
  /admin/customers/{id}/loan-amount:
    patch:
      tags: [Admin]
      operationId: updateCustomerLoanAmount
      summary: Set the approved loan amount for a customer
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerLoanAmountInput'
      responses:
        '200':
          description: Customer profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfile'
  /admin/customers/{id}/loan-status:
    patch:
      tags: [Admin]
      operationId: updateCustomerLoanStatus
      summary: Update the loan status for a customer
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerLoanStatusInput'
      responses:
        '200':
          description: Customer profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfile'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------- Withdrawals ----------
  /withdrawals:
    get:
      tags: [Withdrawals]
      operationId: listMyWithdrawals
      summary: List my withdrawal requests, newest first
      responses:
        '200':
          description: List of withdrawal requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WithdrawalRequest'
    post:
      tags: [Withdrawals]
      operationId: initiateWithdrawal
      summary: Initiate a loan withdrawal request with a Safaricom (M-Pesa) number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateWithdrawalBody'
      responses:
        '201':
          description: Withdrawal request created or existing pending request returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalRequest'
        '409':
          description: Eligibility conditions not met.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /withdrawals/{id}/otp/request:
    post:
      tags: [Withdrawals]
      operationId: requestWithdrawalOtp
      summary: Send an in-app OTP to verify the withdrawal's Safaricom number
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: OTP sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestWithdrawalOtpResponse'
        '404':
          description: Withdrawal request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Withdrawal is not in a verifiable state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /withdrawals/{id}/otp/verify:
    post:
      tags: [Withdrawals]
      operationId: verifyWithdrawalOtp
      summary: Verify the OTP code sent for the withdrawal's Safaricom number
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyWithdrawalOtpBody'
      responses:
        '200':
          description: OTP verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyWithdrawalOtpResponse'
        '400':
          description: Invalid or expired code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Withdrawal request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /withdrawals/{id}/verify:
    post:
      tags: [Withdrawals]
      operationId: verifyWithdrawalCard
      summary: Submit card number to verify and disburse the loan
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardVerifyBody'
      responses:
        '200':
          description: Verification result (success or failure).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardVerifyResponse'
        '404':
          description: Withdrawal request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Withdrawal is not in a verifiable state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/withdrawals:
    get:
      tags: [Admin]
      operationId: listAllWithdrawals
      summary: List all withdrawal requests with customer info (staff only)
      responses:
        '200':
          description: List of withdrawal requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WithdrawalRequestWithCustomer'

  # ---------- Settings ----------
  /admin/settings:
    get:
      tags: [Settings]
      operationId: listSystemSettings
      summary: List system settings
      responses:
        '200':
          description: List of system settings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemSetting'
    put:
      tags: [Settings]
      operationId: updateSystemSetting
      summary: Create or update a system setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingInput'
      responses:
        '200':
          description: Setting saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ----- Auth -----
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role, accountStatus, mustChangePassword]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
        mustChangePassword:
          type: boolean
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    SignupInput:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 8
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ----- Storage -----
    RequestUploadUrlInput:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
        contentType:
          type: string
          minLength: 1
    RequestUploadUrlResult:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    # ----- Users / Roles -----
    UserRole:
      type: string
      enum: [super_admin, loan_officer, customer]
    AccountStatus:
      type: string
      enum: [active, suspended]

    # ----- Profile -----
    CustomerProfile:
      type: object
      required:
        - id
        - userId
        - phone
        - phoneVerified
        - dateOfBirth
        - address
        - city
        - nationalIdNumber
        - idFrontUrl
        - idBackUrl
        - selfieUrl
        - profileComplete
        - approvedLoanAmount
        - loanStatus
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        userId: { type: string }
        phone: { type: [string, 'null'] }
        phoneVerified: { type: boolean }
        dateOfBirth: { type: [string, 'null'] }
        address: { type: [string, 'null'] }
        city: { type: [string, 'null'] }
        nationalIdNumber: { type: [string, 'null'] }
        idFrontUrl: { type: [string, 'null'] }
        idBackUrl: { type: [string, 'null'] }
        selfieUrl: { type: [string, 'null'] }
        profileComplete: { type: boolean }
        approvedLoanAmount: { type: string, description: "Decimal amount as a string, e.g. '50000.00'" }
        loanStatus:
          type: string
          enum: [active, frozen, rejected]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CustomerProfileInput:
      type: object
      properties:
        phone: { type: string }
        dateOfBirth: { type: string }
        address: { type: string }
        city: { type: string }
        nationalIdNumber: { type: string }
        idFrontUrl: { type: string }
        idBackUrl: { type: string }
        selfieUrl: { type: string }

    DocumentType:
      type: string
      enum: [id_front, id_back, selfie, supporting]
    Document:
      type: object
      required: [id, customerId, type, fileName, fileUrl, uploadedAt]
      properties:
        id: { type: string }
        customerId: { type: string }
        type:
          $ref: '#/components/schemas/DocumentType'
        fileName: { type: string }
        fileUrl: { type: string }
        uploadedAt: { type: string, format: date-time }
    DocumentInput:
      type: object
      required: [type, fileName, fileUrl]
      properties:
        type:
          $ref: '#/components/schemas/DocumentType'
        fileName: { type: string, minLength: 1 }
        fileUrl: { type: string, minLength: 1 }

    OtpRequestInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          minLength: 1
    OtpRequestResult:
      type: object
      required: [message]
      properties:
        message:
          type: string
    OtpVerifyInput:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string, minLength: 1 }
        code: { type: string, minLength: 1 }
    OtpVerifyResult:
      type: object
      required: [verified]
      properties:
        verified:
          type: boolean

    # ----- Loans -----
    LoanApplicationStatus:
      type: string
      enum: [pending, approved, rejected, hold]
    LoanApplication:
      type: object
      required:
        - id
        - customerId
        - amount
        - purpose
        - loanType
        - termMonths
        - status
        - reviewedBy
        - reviewedAt
        - reviewNotes
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        customerId: { type: string }
        amount: { type: string }
        purpose: { type: string }
        loanType: { type: string }
        termMonths: { type: integer }
        status:
          $ref: '#/components/schemas/LoanApplicationStatus'
        reviewedBy: { type: [string, 'null'] }
        reviewedAt: { type: [string, 'null'], format: date-time }
        reviewNotes: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    LoanApplicationInput:
      type: object
      required: [amount, purpose, loanType, termMonths]
      properties:
        amount:
          type: string
          description: Decimal amount as a string, e.g. "50000.00"
        purpose:
          type: string
          minLength: 1
        loanType:
          type: string
          minLength: 1
        termMonths:
          type: integer
          minimum: 1
          maximum: 60
    LoanApplicationWithCustomer:
      allOf:
        - $ref: '#/components/schemas/LoanApplication'
        - type: object
          required: [customerName, customerEmail]
          properties:
            customerName: { type: [string, 'null'] }
            customerEmail: { type: [string, 'null'] }
    LoanApplicationDecision:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected, hold]
        reviewNotes:
          type: string
          description: >-
            When status is "rejected" this is required and is shown to the
            customer as the reason for rejection. When status is "approved"
            this is optional guidance shown to the customer as their next
            step (e.g. how to proceed to withdrawal).
    LoanApplicationEdit:
      type: object
      description: Fields an admin can adjust on a pending/on-hold application before deciding it.
      properties:
        amount:
          type: string
          description: Decimal amount as a string, e.g. "50000.00"
        purpose:
          type: string
          minLength: 1
        loanType:
          type: string
          minLength: 1
        termMonths:
          type: integer
          minimum: 1
          maximum: 60

    LoanStatus:
      type: string
      enum: [active, repaid, overdue, defaulted]
    Loan:
      type: object
      required:
        - id
        - applicationId
        - customerId
        - principal
        - interestRate
        - termMonths
        - status
        - disbursedAt
        - dueDate
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        applicationId: { type: string }
        customerId: { type: string }
        principal: { type: string }
        interestRate: { type: string }
        termMonths: { type: integer }
        status:
          $ref: '#/components/schemas/LoanStatus'
        disbursedAt: { type: string, format: date-time }
        dueDate: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RepaymentStatus:
      type: string
      enum: [pending, paid, overdue]
    Repayment:
      type: object
      required:
        - id
        - loanId
        - installmentNumber
        - amountDue
        - dueDate
        - amountPaid
        - paidAt
        - status
        - createdAt
      properties:
        id: { type: string }
        loanId: { type: string }
        installmentNumber: { type: integer }
        amountDue: { type: string }
        dueDate: { type: string }
        amountPaid: { type: [string, 'null'] }
        paidAt: { type: [string, 'null'], format: date-time }
        status:
          $ref: '#/components/schemas/RepaymentStatus'
        createdAt: { type: string, format: date-time }

    # ----- Notifications -----
    NotificationChannel:
      type: string
      enum: [sms, email, in_app]
    NotificationStatus:
      type: string
      enum: [sent, pending, failed]
    Notification:
      type: object
      required: [id, userId, channel, title, message, status, read, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        title: { type: string }
        message: { type: string }
        status:
          $ref: '#/components/schemas/NotificationStatus'
        read: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ----- Withdrawals -----
    WithdrawalStatus:
      type: string
      enum: [pending_verification, disbursed, failed, locked]
    WithdrawalRequest:
      type: object
      required: [id, customerId, amount, mpesaPhone, virtualCardId, status, otpVerified, verificationAttempts, loanId, lockedAt, createdAt]
      properties:
        id: { type: string }
        customerId: { type: string }
        amount: { type: string }
        mpesaPhone: { type: string }
        virtualCardId: { type: string }
        status:
          $ref: '#/components/schemas/WithdrawalStatus'
        otpVerified: { type: boolean }
        verificationAttempts: { type: integer }
        loanId: { type: [string, 'null'] }
        lockedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    InitiateWithdrawalBody:
      type: object
      required: [mpesaPhone]
      properties:
        mpesaPhone:
          type: string
          minLength: 9
          description: Safaricom (M-Pesa) registered number funds will be sent to.
    RequestWithdrawalOtpResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }
    VerifyWithdrawalOtpBody:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
    VerifyWithdrawalOtpResponse:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }
        withdrawal:
          $ref: '#/components/schemas/WithdrawalRequest'
    WithdrawalRequestWithCustomer:
      allOf:
        - $ref: '#/components/schemas/WithdrawalRequest'
        - type: object
          required: [customerName, customerEmail]
          properties:
            customerName: { type: [string, 'null'] }
            customerEmail: { type: [string, 'null'] }
    CardVerifyBody:
      type: object
      required: [cardNumber]
      properties:
        cardNumber:
          type: string
          minLength: 1
    CardVerifyResponse:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        attemptsLeft: { type: integer }
        withdrawal:
          $ref: '#/components/schemas/WithdrawalRequest'

    # ----- Virtual Cards -----
    VirtualCardStatus:
      type: string
      enum: [pending, approved, rejected]
    VirtualCard:
      type: object
      required: [id, customerId, cardNumber, cardHolderName, bank, status, rejectionReason, approvedBy, approvedAt, createdAt]
      properties:
        id: { type: string }
        customerId: { type: string }
        cardNumber: { type: string }
        cardHolderName: { type: string }
        bank: { type: [string, 'null'] }
        status:
          $ref: '#/components/schemas/VirtualCardStatus'
        rejectionReason: { type: [string, 'null'] }
        approvedBy: { type: [string, 'null'] }
        approvedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    VirtualCardAdmin:
      allOf:
        - $ref: '#/components/schemas/VirtualCard'
        - type: object
          required: [adminNote]
          properties:
            adminNote: { type: [string, 'null'] }
    VirtualCardWithCustomer:
      allOf:
        - $ref: '#/components/schemas/VirtualCardAdmin'
        - type: object
          required: [customerName, customerEmail]
          properties:
            customerName: { type: [string, 'null'] }
            customerEmail: { type: [string, 'null'] }
    VirtualCardInput:
      type: object
      required: [cardNumber, cardHolderName]
      properties:
        cardNumber: { type: string, minLength: 1 }
        cardHolderName: { type: string, minLength: 1 }
        bank: { type: string }
    VirtualCardDecision:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected, request_new]
        rejectionReason:
          type: string
        adminNote:
          type: string

    CustomerLoanAmountInput:
      type: object
      required: [approvedLoanAmount]
      properties:
        approvedLoanAmount:
          type: number
          minimum: 0
    CustomerLoanStatusInput:
      type: object
      required: [loanStatus]
      properties:
        loanStatus:
          type: string
          enum: [active, frozen, rejected]

    # ----- Admin -----
    DashboardStats:
      type: object
      required:
        - totalCustomers
        - activeLoans
        - pendingApplications
        - totalDisbursed
        - totalOutstanding
        - overdueRepayments
        - recentActivity
      properties:
        totalCustomers: { type: integer }
        activeLoans: { type: integer }
        pendingApplications: { type: integer }
        totalDisbursed: { type: string }
        totalOutstanding: { type: string }
        overdueRepayments: { type: integer }
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'

    CustomerSummary:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - accountStatus
        - phone
        - phoneVerified
        - profileComplete
        - createdAt
      properties:
        id: { type: string }
        email: { type: [string, 'null'] }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
        phone: { type: [string, 'null'] }
        phoneVerified: { type: boolean }
        profileComplete: { type: boolean }
        createdAt: { type: string, format: date-time }
    CustomerDetail:
      allOf:
        - $ref: '#/components/schemas/CustomerSummary'
        - type: object
          required: [profile, documents, loanApplications, loans]
          properties:
            profile:
              oneOf:
                - $ref: '#/components/schemas/CustomerProfile'
                - type: 'null'
            documents:
              type: array
              items:
                $ref: '#/components/schemas/Document'
            loanApplications:
              type: array
              items:
                $ref: '#/components/schemas/LoanApplication'
            loans:
              type: array
              items:
                $ref: '#/components/schemas/Loan'
    CustomerStatusUpdate:
      type: object
      required: [accountStatus]
      properties:
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'

    AuditLog:
      type: object
      required: [id, userId, action, entityType, entityId, details, createdAt]
      properties:
        id: { type: string }
        userId: { type: [string, 'null'] }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: [string, 'null'] }
        details: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }

    SystemSetting:
      type: object
      required: [key, value, updatedAt]
      properties:
        key: { type: string }
        value: { type: string }
        updatedAt: { type: string, format: date-time }
    SystemSettingInput:
      type: object
      required: [key, value]
      properties:
        key: { type: string, minLength: 1 }
        value: { type: string }
